<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentLabs LoRA Report</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: 'Inter', sans-serif; background: #fcfcf7; color: #1d1d1f;
  padding: 32px; max-width: 1200px; margin: auto;
}
h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
h2 { font-size: 18px; font-weight: 600; margin-bottom: 12px; margin-top: 24px; }
button {
  font-family: 'Inter', sans-serif; cursor: pointer;
  border-radius: 8px; font-weight: 600; border: none;
  padding: 10px 24px; font-size: 14px; transition: opacity .2s;
}
button.primary { background: #7C3AED; color: #fff; }
button.primary:hover { opacity: 0.85; }
button.primary:disabled { background: #dcd8cc; cursor: wait; }
.metrics { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 12px; margin: 16px 0; }
.card { background: #fff; border: 1px solid #dcd8cc; border-radius: 12px; padding: 16px; }
.card .label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; font-weight: 600; color: #7a7d85; margin-bottom: 4px; }
.card .value { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; }
.item { background: #fff; border: 1px solid #dcd8cc; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.item-header { display: flex; align-items: flex-start; gap: 12px; cursor: pointer; }
.badge { display: inline-block; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; padding: 2px 6px; border-radius: 4px; }
code { font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; background: #faf9f6; border: 1px solid #dcd8cc; border-radius: 8px; padding: 12px; display: block; margin-top: 4px; max-height: 150px; overflow-y: auto; }
.compare { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
@media (max-width: 640px) { .compare { grid-template-columns: 1fr; } }
.target { background: rgba(33,134,90,.06); border: 1px solid rgba(33,134,90,.2); color: #21865a; border-radius: 8px; padding: 12px; margin-top: 8px; font-size: 13px; }
.error { background: rgba(194,65,75,.06); border: 1px solid rgba(194,65,75,.2); border-radius: 8px; padding: 16px; color: #c2414b; margin: 12px 0; }
.loading { text-align: center; padding: 48px; color: #7a7d85; }
</style>
</head><body>

<h1>LoRA Training Report</h1>
<p style="color:#575a60;font-size:14px;margin-bottom:16px;">
  Real model: sshleifer/tiny-gpt2 (102K params) on GPU. 24 synthetic prompts, 30 LoRA training steps.
</p>

<button class="primary" id="genBtn" onclick="generateReport()">Generate Report</button>
<div id="loading" class="loading" style="display:none">Running real LoRA training...</div>
<div id="error" class="error" style="display:none"></div>
<div id="results"></div>

<script>
async function generateReport() {
  const btn = document.getElementById('genBtn');
  const loading = document.getElementById('loading');
  const error = document.getElementById('error');
  const results = document.getElementById('results');

  btn.disabled = true;
  btn.textContent = 'Training...';
  loading.style.display = 'block';
  error.style.display = 'none';
  results.innerHTML = '';

  try {
    const res = await fetch('/api/lora/real/report', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }
    });
    if (!res.ok) {
      let msg = res.statusText;
      try { const e = await res.json(); msg = e.detail?.error || e.detail || msg; } catch {}
      throw new Error(msg);
    }
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    if (!data.summary) throw new Error('Incomplete report data');

    loading.style.display = 'none';
    btn.disabled = false;
    btn.textContent = 'Re-run Report';

    renderReport(data);
  } catch (e) {
    loading.style.display = 'none';
    btn.disabled = false;
    btn.textContent = 'Generate Report';
    error.style.display = 'block';
    error.textContent = 'Error: ' + e.message;
  }
}

function renderReport(data) {
  const s = data.summary || {};
  const tm = data.training_metrics || {};
  const el = document.getElementById('results');

  // KPI cards
  el.innerHTML = '<div class="metrics" id="kpis"></div><div id="comparisons"></div>';
  
  const kpis = document.getElementById('kpis');
  const kpiData = [
    ['Pass Rate', ((s.pass_rate||0)*100).toFixed(0)+'%', s.passed+'/'+s.total, '#21865a'],
    ['Avg Base Score', (s.avg_base_score||0).toFixed(3), 'avg', '#5a6e86'],
    ['Avg LoRA Score', (s.avg_lora_score||0).toFixed(3), 'avg', '#7c3aed'],
    ['Improvement', '+' + ((s.improvement||0)*100).toFixed(1)+'%', 'relative', (s.improvement||0)>0 ? '#21865a' : '#c2414b'],
    ['Training Loss', (tm.final_loss||0).toFixed(3), (tm.steps_trained||0)+' steps', '#c77700'],
    ['Trainable Params', (tm.trainable_params||0).toLocaleString(), 'LoRA', '#0284c7'],
  ];
  kpiData.forEach(([label,value,suffix,color]) => {
    kpis.innerHTML += '<div class="card"><div class="label">'+label+'</div><div class="value" style="color:'+color+'">'+value+' <span style="font-size:13px;font-weight:600;color:#7a7d85">'+suffix+'</span></div></div>';
  });

  // Training config
  el.innerHTML += '<div class="card" style="margin-top:16px;background:rgba(2,132,199,.04);border-color:rgba(2,132,199,.15)"><div class="label">Training Configuration</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:8px">' +
    '<div><div class="label">Model</div><div style="font-family:JetBrains Mono,monospace;font-size:13px">'+(data.model||'unknown')+'</div></div>' +
    '<div><div class="label">Dataset</div><div style="font-family:JetBrains Mono,monospace;font-size:13px">'+(data.dataset_size||0)+' prompts</div></div>' +
    '<div><div class="label">Mode</div><div style="font-family:JetBrains Mono,monospace;font-size:13px">'+(tm.real_or_simulated||'simulation')+'</div></div>' +
    '<div><div class="label">LoRA Steps</div><div style="font-family:JetBrains Mono,monospace;font-size:13px">'+(tm.steps_trained||0)+'</div></div></div></div>';

  // Comparisons
  const comps = data.comparisons || [];
  const failedOnly = comps.filter(c => !c.passed);
  const show = comps;
  
  el.innerHTML += '<h2>All Comparisons ('+show.length+')</h2>';

  show.forEach((item, idx) => {
    const isPassed = item.passed;
    const delta = ((item.lora_score||0) - (item.base_score||0)).toFixed(3);
    const deltaColor = delta > 0 ? '#21865a' : '#c2414b';

    const html = '<div class="item">' +
      '<div class="item-header" onclick="toggle('+idx+')">' +
        '<span class="badge" style="background:'+(isPassed?'rgba(33,134,90,.12)':'rgba(194,65,75,.12)')+';color:'+(isPassed?'#21865a':'#c2414b')+'">'+(isPassed?'PASS':'FAIL')+'</span>' +
        '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500">'+escHtml(item.prompt)+'</div>' +
        '<div style="margin-top:4px;display:flex;gap:8px;align-items:center;font-size:10px">' +
          '<span class="badge" style="background:'+catColor(item.category)+'12;color:'+catColor(item.category)+'">'+catLabel(item.category)+'</span>' +
          '<span style="color:#7a7d85;font-family:JetBrains Mono,monospace">base '+(item.base_score||0).toFixed(2)+' &rarr; lora '+(item.lora_score||0).toFixed(2)+'</span>' +
          '<span style="color:'+deltaColor+';font-weight:700">'+(delta>0?'+':'')+delta+'</span>' +
        '</div></div>' +
        '<span style="color:#7a7d85;font-size:12px">&#9660;</span>' +
      '</div>' +
      '<div id="detail-'+idx+'" style="display:none;margin-top:12px;border-top:1px solid rgba(220,216,204,.4);padding-top:12px">' +
        '<div class="label">Prompt</div><code style="font-size:13px">'+escHtml(item.prompt)+'</code>' +
        '<div class="label" style="margin-top:8px">Target (desired response)</div>' +
        '<div class="target">'+escHtml(item.target)+'</div>' +
        '<div class="compare">' +
          '<div><div style="display:flex;justify-content:space-between"><span class="label">Base Model</span><span style="font-family:JetBrains Mono,monospace;font-size:10px;color:#5a6e86">score: '+(item.base_score||0).toFixed(3)+'</span></div><code>'+escHtml(item.base_response)+'</code></div>' +
          '<div><div style="display:flex;justify-content:space-between"><span class="label" style="color:#7c3aed">LoRA Patched</span><span style="font-family:JetBrains Mono,monospace;font-size:10px;color:'+deltaColor+'">score: '+(item.lora_score||0).toFixed(3)+'</span></div><code style="background:'+(isPassed?'rgba(33,134,90,.04)':'rgba(194,65,75,.04)')+';border-color:'+(isPassed?'rgba(33,134,90,.3)':'rgba(194,65,75,.2)')+'">'+escHtml(item.lora_response)+'</code></div>' +
        '</div>' +
        '<div style="margin-top:8px;display:flex;align-items:center;gap:8px;font-size:11px;font-family:JetBrains Mono,monospace;padding:8px 12px;border-radius:8px;background:'+(delta>0?'rgba(33,134,90,.06)':'rgba(194,65,75,.06)')+';color:'+deltaColor+'">' +
          '<strong>Score delta:</strong> '+(item.base_score||0).toFixed(3)+' &rarr; '+(item.lora_score||0).toFixed(3)+' ('+(delta>0?'+':'')+delta+') &mdash; ' +
          (isPassed ? 'LoRA improved this response' : 'LoRA did not sufficiently improve this response') +
        '</div>' +
      '</div>' +
    '</div>';
    el.querySelector('#comparisons').innerHTML += html;
  });
}

function toggle(idx) {
  const el = document.getElementById('detail-'+idx);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function catColor(c) {
  const colors = {instruction_following:'#2563eb',refusal_precision:'#7c3aed',domain_accuracy:'#0284c7',hallucination_control:'#c77700',format_adherence:'#21865a'};
  return colors[c]||'#5a6e86';
}

function catLabel(c) { return String(c||'').replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase()); }
</script>
</body></html>
