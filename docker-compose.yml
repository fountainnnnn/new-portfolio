services:
  portfolio:
    build:
      context: ./apps/portfolio-website
    environment:
      PORT: 3000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${PORTFOLIO_OPENAI_MODEL:-gpt-4.1-mini}
      QUIZ_GENERATOR_API_URL: ${QUIZ_GENERATOR_API_URL:-http://quiz-generator:7860}
      MOCK_GENERATOR_API_URL: ${MOCK_GENERATOR_API_URL:-http://mock-generator:7860}
      FILE_CHAT_ASSISTANT_API_URL: ${FILE_CHAT_ASSISTANT_API_URL:-http://file-chat-assistant:7860}
      CODING_QUIZ_API_URL: ${CODING_QUIZ_API_URL:-http://coding-quiz:7860}
      AUTO_DASHBOARD_FRONTEND_URL: http://auto-dashboard-frontend:8020
      AUTO_DASHBOARD_API_URL: http://auto-dashboard-backend:8000
      SCHOOL_HDB_RESALE_URL: http://school-hdb-resale-ca1:5000
      SCHOOL_VEGGIE_AI_URL: http://school-veggie-ai-ca2:5000
    expose:
      - "3000"
    restart: unless-stopped
    depends_on:
      - quiz-generator
      - mock-generator
      - file-chat-assistant
      - coding-quiz
      - auto-dashboard-frontend
      - auto-dashboard-backend
      - school-hdb-resale-ca1
      - school-veggie-ai-ca2

  quiz-generator:
    build:
      context: ./services/quiz-generator
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      QUIZ_GENERATOR_MODEL: ${QUIZ_GENERATOR_MODEL:-gpt-4.1}
      QUIZ_GENERATOR_RATE_MAX: ${QUIZ_GENERATOR_RATE_MAX:-4}
      QUIZ_GENERATOR_RATE_WINDOW_SECONDS: ${QUIZ_GENERATOR_RATE_WINDOW_SECONDS:-60}
      QUIZ_GENERATOR_FILE_RATE_MAX: ${QUIZ_GENERATOR_FILE_RATE_MAX:-60}
      QUIZ_GENERATOR_FILE_RATE_WINDOW_SECONDS: ${QUIZ_GENERATOR_FILE_RATE_WINDOW_SECONDS:-60}
      QUIZ_GENERATOR_MAX_UPLOAD_BYTES: ${QUIZ_GENERATOR_MAX_UPLOAD_BYTES:-15728640}
      QUIZ_GENERATOR_BATCH_SIZE: ${QUIZ_GENERATOR_BATCH_SIZE:-5}
      QUIZ_GENERATOR_MAX_PARALLEL_CALLS: ${QUIZ_GENERATOR_MAX_PARALLEL_CALLS:-4}
      PUBLIC_QUIZ_GENERATOR_BASE_URL: ${PUBLIC_QUIZ_GENERATOR_BASE_URL:-}
      SLIDES_OCR_EPHEMERAL: ${SLIDES_OCR_EPHEMERAL:-1}
    expose:
      - "7860"
    restart: unless-stopped

  mock-generator:
    build:
      context: ./services/mock-generator
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MOCK_GENERATOR_MODEL: ${MOCK_GENERATOR_MODEL:-gpt-4.1}
      MOCK_GENERATOR_RATE_MAX: ${MOCK_GENERATOR_RATE_MAX:-3}
      MOCK_GENERATOR_RATE_WINDOW_SECONDS: ${MOCK_GENERATOR_RATE_WINDOW_SECONDS:-60}
      MOCK_GENERATOR_MAX_UPLOAD_BYTES: ${MOCK_GENERATOR_MAX_UPLOAD_BYTES:-20971520}
      MOCK_GENERATOR_MAX_PARALLEL_CALLS: ${MOCK_GENERATOR_MAX_PARALLEL_CALLS:-3}
      MOCK_GENERATOR_WARM_EASYOCR: ${MOCK_GENERATOR_WARM_EASYOCR:-0}
      PAPERS_OCR_EPHEMERAL: ${PAPERS_OCR_EPHEMERAL:-1}
    expose:
      - "7860"
    restart: unless-stopped

  file-chat-assistant:
    build:
      context: ./services/file-chat-assistant
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FILE_CHAT_MODEL: ${FILE_CHAT_MODEL:-gpt-5-mini}
      FILE_CHAT_MAX_UPLOAD_BYTES: ${FILE_CHAT_MAX_UPLOAD_BYTES:-8388608}
      FILE_CHAT_MAX_TEXT_CHARS: ${FILE_CHAT_MAX_TEXT_CHARS:-180000}
      FILE_CHAT_MAX_QUESTION_CHARS: ${FILE_CHAT_MAX_QUESTION_CHARS:-1200}
      FILE_CHAT_SESSION_TTL_SECONDS: ${FILE_CHAT_SESSION_TTL_SECONDS:-3600}
      FILE_CHAT_UPLOAD_RATE_MAX: ${FILE_CHAT_UPLOAD_RATE_MAX:-4}
      FILE_CHAT_UPLOAD_RATE_WINDOW_SECONDS: ${FILE_CHAT_UPLOAD_RATE_WINDOW_SECONDS:-60}
      FILE_CHAT_ASK_RATE_MAX: ${FILE_CHAT_ASK_RATE_MAX:-30}
      FILE_CHAT_ASK_RATE_WINDOW_SECONDS: ${FILE_CHAT_ASK_RATE_WINDOW_SECONDS:-60}
    expose:
      - "7860"
    restart: unless-stopped

  coding-quiz:
    build:
      context: ./services/coding-quiz
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CODING_QUIZ_MODEL: ${CODING_QUIZ_MODEL:-gpt-4.1}
      CODING_QUIZ_SESSION_TTL_SECONDS: ${CODING_QUIZ_SESSION_TTL_SECONDS:-3600}
      CODING_QUIZ_GENERATE_RATE_MAX: ${CODING_QUIZ_GENERATE_RATE_MAX:-6}
      CODING_QUIZ_GENERATE_RATE_WINDOW_SECONDS: ${CODING_QUIZ_GENERATE_RATE_WINDOW_SECONDS:-60}
      CODING_QUIZ_ANSWER_RATE_MAX: ${CODING_QUIZ_ANSWER_RATE_MAX:-120}
      CODING_QUIZ_ANSWER_RATE_WINDOW_SECONDS: ${CODING_QUIZ_ANSWER_RATE_WINDOW_SECONDS:-60}
      CODING_QUIZ_MAX_PARALLEL_CALLS: ${CODING_QUIZ_MAX_PARALLEL_CALLS:-8}
      CODING_QUIZ_BATCH_SIZE: ${CODING_QUIZ_BATCH_SIZE:-5}
      CODING_QUIZ_OPENAI_TIMEOUT_SECONDS: ${CODING_QUIZ_OPENAI_TIMEOUT_SECONDS:-20}
      CODING_QUIZ_RETRY_ATTEMPTS: ${CODING_QUIZ_RETRY_ATTEMPTS:-0}
    expose:
      - "7860"
    restart: unless-stopped

  auto-dashboard-frontend:
    build:
      context: ./projects/auto-dashboard/frontend
      args:
        AUTODASH_BASE_PATH: /auto-dashboard
        NEXT_PUBLIC_API_BASE_URL: /api/auto-dashboard
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      AUTODASH_BASE_PATH: /auto-dashboard
      NEXT_PUBLIC_API_BASE_URL: /api/auto-dashboard
    expose:
      - "8020"
    restart: unless-stopped
    depends_on:
      - auto-dashboard-backend

  auto-dashboard-backend:
    build:
      context: ./projects/auto-dashboard/backend
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${AUTODASH_OPENAI_MODEL:-gpt-5-mini}
      OPENAI_PLANNER_MODEL: ${AUTODASH_OPENAI_PLANNER_MODEL:-gpt-5-mini}
      OPENAI_PATCH_MODEL: ${AUTODASH_OPENAI_PATCH_MODEL:-gpt-5-mini}
      OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-low}
      OPENAI_REQUEST_TIMEOUT: ${AUTODASH_OPENAI_REQUEST_TIMEOUT:-25}
      OPENAI_PLANNER_TIMEOUT: ${AUTODASH_OPENAI_PLANNER_TIMEOUT:-8}
      OPENAI_MAX_RETRIES: ${AUTODASH_OPENAI_MAX_RETRIES:-0}
      FRONTEND_ORIGIN: ${PUBLIC_APP_URL:-http://localhost}
      AUTODASH_RENDER_PLOTLY_JSON: ${AUTODASH_RENDER_PLOTLY_JSON:-false}
      AUTODASH_PARALLEL_CHARTS: ${AUTODASH_PARALLEL_CHARTS:-true}
      AUTODASH_MAX_ROWS_FOR_RENDER: ${AUTODASH_MAX_ROWS_FOR_RENDER:-25000}
      AUTODASH_PBITOOLS_MODE: ${AUTODASH_PBITOOLS_MODE:-auto}
      AUTODASH_DB_PATH: ${AUTODASH_DB_PATH:-}
      AUTODASH_RECORD_CACHE_SIZE: ${AUTODASH_RECORD_CACHE_SIZE:-32}
      AUTODASH_PBIX_TEMPLATE_PATH: ${AUTODASH_PBIX_TEMPLATE_PATH:-}
      AUTODASH_PBITOOLS_EXPORT_BUDGET_SECONDS: ${AUTODASH_PBITOOLS_EXPORT_BUDGET_SECONDS:-30}
      AUTODASH_PBITOOLS_EXTRACT_PATH: ${AUTODASH_PBITOOLS_EXTRACT_PATH:-}
      AUTODASH_PBITOOLS_COMPILE_PATH: ${AUTODASH_PBITOOLS_COMPILE_PATH:-}
      AUTODASH_PBITOOLS_PATH: ${AUTODASH_PBITOOLS_PATH:-}
    expose:
      - "8000"
    restart: unless-stopped

  school-hdb-resale-ca1:
    build:
      context: ./projects/school-hdb-resale-ca1
    environment:
      PORT: 5000
      APP_BASE_PATH: /school-hdb-resale-ca1
      SECRET_KEY: ${SCHOOL_HDB_SECRET_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${SCHOOL_HDB_OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_INSIGHTS_MODEL: ${SCHOOL_HDB_OPENAI_INSIGHTS_MODEL:-}
      CHATBOT_CONTEXT_PATH: ${SCHOOL_HDB_CHATBOT_CONTEXT_PATH:-application/resources/chatbot_context.txt}
      CHATBOT_TITLE: ${SCHOOL_HDB_CHATBOT_TITLE:-HDB Resale Copilot}
      SQLALCHEMY_DATABASE_URI: ${SCHOOL_HDB_SQLALCHEMY_DATABASE_URI:-}
      MODEL_PACKAGE_PATH: ${SCHOOL_HDB_MODEL_PACKAGE_PATH:-}
      DEMAND_MODEL_PACKAGE_PATH: ${SCHOOL_HDB_DEMAND_MODEL_PACKAGE_PATH:-}
      EXIT_VALUE_MODEL_PATH: ${SCHOOL_HDB_EXIT_VALUE_MODEL_PATH:-}
      MODEL_DATASET_PATH: ${SCHOOL_HDB_MODEL_DATASET_PATH:-}
      SKIP_PREDICTOR_BOOTSTRAP: ${SCHOOL_HDB_SKIP_PREDICTOR_BOOTSTRAP:-false}
      GUNICORN_WORKERS: ${SCHOOL_HDB_GUNICORN_WORKERS:-2}
      GUNICORN_TIMEOUT: ${SCHOOL_HDB_GUNICORN_TIMEOUT:-120}
      FLASK_ENV: production
    expose:
      - "5000"
    restart: unless-stopped

  school-veggie-ai-ca2:
    build:
      context: ./projects/school-veggie-ai-ca2
    environment:
      PORT: 5000
      APP_BASE_PATH: /school-veggie-ai-ca2
      SECRET_KEY: ${SCHOOL_VEGGIE_SECRET_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${SCHOOL_VEGGIE_OPENAI_MODEL:-gpt-4.1-mini}
      MODEL_INFERENCE_URL: ${SCHOOL_VEGGIE_MODEL_INFERENCE_URL:-}
      GOOGLE_CLIENT_ID: ${SCHOOL_VEGGIE_GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${SCHOOL_VEGGIE_GOOGLE_CLIENT_SECRET:-}
      OPENAI_CHAT_SYSTEM_PROMPT: ${SCHOOL_VEGGIE_OPENAI_CHAT_SYSTEM_PROMPT:-}
      SQLALCHEMY_DATABASE_URI: ${SCHOOL_VEGGIE_SQLALCHEMY_DATABASE_URI:-}
      MAX_CONTENT_LENGTH: ${SCHOOL_VEGGIE_MAX_CONTENT_LENGTH:-16777216}
      SESSION_COOKIE_SAMESITE: ${SCHOOL_VEGGIE_SESSION_COOKIE_SAMESITE:-Lax}
      SESSION_COOKIE_SECURE: ${SCHOOL_VEGGIE_SESSION_COOKIE_SECURE:-true}
      SESSION_DAYS: ${SCHOOL_VEGGIE_SESSION_DAYS:-7}
      TRUST_PROXY_HEADERS: ${SCHOOL_VEGGIE_TRUST_PROXY_HEADERS:-true}
      SKIP_DB_BOOTSTRAP: ${SCHOOL_VEGGIE_SKIP_DB_BOOTSTRAP:-false}
      GUNICORN_WORKERS: ${SCHOOL_VEGGIE_GUNICORN_WORKERS:-2}
      GUNICORN_TIMEOUT: ${SCHOOL_VEGGIE_GUNICORN_TIMEOUT:-120}
      FLASK_ENV: production
    expose:
      - "5000"
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - portfolio
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
