<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Property Predictor{% endblock %}</title>

    <!-- Fonts & Bootstrap -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
          

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Global stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
    <script>
      window.APP_BASE_PATH = "{{ request.script_root }}";
      window.withAppBasePath = function (url) {
        const base = window.APP_BASE_PATH || "";
        if (!base || typeof url !== "string" || !url.startsWith("/") || url.startsWith("//") || url.startsWith(base + "/")) {
          return url;
        }
        return base + url;
      };
      window.fetch = new Proxy(window.fetch, {
        apply(target, thisArg, args) {
          if (typeof args[0] === "string") {
            args[0] = window.withAppBasePath(args[0]);
          }
          return Reflect.apply(target, thisArg, args);
        }
      });
    </script>
    
    {% block extra_css %}{% endblock %}
</head>


<body class="d-flex flex-column min-vh-100">
    {% include "includes/nav.html" %}

    <!-- Allow full-width layouts -->
    <main class="flex-grow-1">
        {% block content %}{% endblock %}
    </main>

    {% include "includes/footer.html" %}
    {% include "includes/chatbot.html" %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='js/chatbot.js') }}" defer></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
